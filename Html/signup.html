  <main class="auth-wrapper">
    <div class="auth-card">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join Schecter Guitars today</p>
      
      <form id="signupForm" class="auth-form">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required placeholder="John">
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required placeholder="Doe">
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="6" placeholder="••••••••">
          <small class="form-hint">Minimum 6 characters</small>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" required placeholder="••••••••">
        </div>
        <div class="form-group">
          <label class="terms-check">
            <input type="checkbox" id="terms" required>
            I agree to the <a href="#" target="_blank">Terms of Service</a> and <a href="#" target="_blank">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="auth-btn">Create Account</button>
        <p class="auth-switch">Already have an account? <a href="../html/login.html">Sign in</a></p>
      </form>
      <div id="signupMessage" class="auth-message"></div>
    </div>
  </main>
